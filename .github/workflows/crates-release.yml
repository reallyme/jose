name: Crates.io Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish reallyme-jose crates to crates.io after the dry run succeeds
        required: true
        type: boolean
        default: false

permissions:
  contents: read

env:
  CARGO_DENY_VERSION: 0.19.6
  BUFFA_VERSION: 0.8.1
  BUF_VERSION: 1.71.0
  BUF_LINUX_X86_64_SHA256: d3de2838c68a5759ca276884254bc70df4e4ad185d6ed5f65f327b6ce6363eab

jobs:
  dry-run:
    name: crates.io publish preflight
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release-commit.outputs.sha }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Record release commit
        id: release-commit
        shell: bash
        run: |
          release_sha="$(git rev-parse HEAD)"
          if [[ ! "$release_sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "checked-out release commit is not a full Git SHA" >&2
            exit 1
          fi
          printf 'sha=%s\n' "$release_sha" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install nextest
        uses: taiki-e/install-action@c61310c7f42caf5b425e349b6742d93ca197327c # nextest

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Install buf
        shell: bash
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/buf/bin"
          mkdir -p "$install_dir"
          curl --fail-with-body --location --proto '=https' --tlsv1.2 \
            --retry 5 --retry-all-errors \
            --output "$install_dir/buf" \
            "https://github.com/bufbuild/buf/releases/download/v${BUF_VERSION}/buf-Linux-x86_64"
          printf '%s  %s\n' "$BUF_LINUX_X86_64_SHA256" "$install_dir/buf" \
            | sha256sum --check --strict
          chmod 0755 "$install_dir/buf"
          printf '%s\n' "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/buf" --version

      - name: Install pinned Buffa generators
        run: |
          cargo install protoc-gen-buffa --version "$BUFFA_VERSION" --locked
          cargo install protoc-gen-buffa-packaging --version "$BUFFA_VERSION" --locked

      - name: Validate and regenerate protobuf artifacts
        run: |
          buf lint
          buf generate
          cargo fmt --package reallyme-jose-proto
          git diff --exit-code -- crates/proto/jose/proto crates/proto/jose/src
          test -z "$(git status --porcelain -- crates/proto/jose/proto crates/proto/jose/src)"

      - name: Format
        run: cargo fmt --check

      - name: Check warnings as errors
        run: RUSTFLAGS=-Dwarnings cargo check --locked --workspace --all-features

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Test all features
        run: cargo nextest run --locked --workspace --all-features

      - name: Check wasm32 lane
        run: cargo check --locked --workspace --no-default-features --features wasm --target wasm32-unknown-unknown

      - name: Install cargo-deny
        run: cargo install cargo-deny --version "$CARGO_DENY_VERSION" --locked

      - name: Dependency policy
        run: cargo deny check

      - name: Release readiness contract
        run: node scripts/check_release_readiness.mjs

      - name: Inspect publishable crate tarballs
        run: node scripts/publish_crates_in_order.mjs inspect
        env:
          CARGO_HOME: ${{ runner.temp }}/package-preflight-cargo-home

  publish:
    name: publish reallyme-jose crates
    needs: dry-run
    if: inputs.publish == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ needs.dry-run.outputs.release_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: 1.96.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'

      - name: Publish reallyme-jose crates
        run: node scripts/publish_crates_in_order.mjs publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Tag published crate version
        id: release-tag
        shell: bash
        run: |
          version="$(node -e 'const fs = require("node:fs"); const text = fs.readFileSync("crates/Cargo.toml", "utf8"); const match = /^version = "([^"]+)"$/m.exec(text); if (!match) process.exit(1); process.stdout.write(match[1]);')"
          tag="reallyme-jose-v${version}"
          head_sha="$(git rev-parse HEAD)"
          git fetch --tags origin
          existing_sha="$(git rev-list -n 1 "$tag" 2>/dev/null || true)"
          if [[ -n "$existing_sha" && "$existing_sha" != "$head_sha" ]]; then
            echo "$tag already exists at $existing_sha, not $head_sha" >&2
            exit 1
          fi
          git config user.name "reallyme-release-bot"
          git config user.email "security@really.me"
          if [[ -z "$existing_sha" ]]; then
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.release-tag.outputs.tag }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$tag" \
            --generate-notes
