name: Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  pull_request:
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "fuzz/**"
      - "crates/proto/jose/proto/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fuzz.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "fuzz/**"
      - "crates/proto/jose/proto/**"

permissions:
  contents: read

jobs:
  build:
    name: fuzz target build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

  scheduled:
    name: fuzz run (${{ matrix.target }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - compact_jwe
          - compact_jwe_ecdh_es
          - compact_jws_es256
          - signed_jwt
          - unsigned_jwt
          - wire_process
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Run time-boxed fuzz target
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300 -rss_limit_mb=4096

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}
          if-no-files-found: ignore
