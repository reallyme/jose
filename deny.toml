[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "wasm32-unknown-unknown",
    "aarch64-apple-ios",
    "aarch64-linux-android",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = []
yanked = "deny"

[licenses]
confidence-threshold = 0.93
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "MIT",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[licenses.private]
ignore = true
registries = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# Direct use of broad error/logging crates is prohibited by repository policy
# and source review. Do not ban transitive use unless we are ready to replace
# upstream dependencies that carry them internally.
deny = []
skip = [
    { name = "getrandom", version = "0.2.17" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
